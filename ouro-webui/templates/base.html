<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ourobor OS Wiki</title>
    <link rel="stylesheet" href="{{ root_prefix }}style.css">
</head>
<body>
    <nav class="sidebar">
        <a class="home-link" href="{{ root_prefix }}index.html">Home</a>
        {% for section in nav_tree %}
        <h4>{{ section.title }}</h4>
        {% for page in section.pages %}
        <a href="{{ root_prefix }}{{ page.href }}">{{ page.label }}</a>
        {% endfor %}
        {% endfor %}
    </nav>
    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
