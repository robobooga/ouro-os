name: Deploy WebUI to GitHub Pages

on:
  push:
    branches: [main, webui]
    paths:
      - 'wiki/**'
      - 'ouro-webui/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install -r ouro-webui/requirements.txt

      - name: Build WebUI
        run: python ouro-webui/builder.py --wiki-dir wiki/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ouro-webui/dist/

      - uses: actions/deploy-pages@v4
        id: deployment
